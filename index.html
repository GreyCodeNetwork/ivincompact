    <title>IV Compatibility Checker</title>
    <style>
        /* Base / Dark Theme Variables */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --card-bg-elevated: #263348;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --border-color: #334155;
            --tag-bg: #2d3748;
            --bg-gradient: radial-gradient(circle at top center, rgba(30, 41, 59, 0.8) 0%, var(--bg-color) 100%);
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.2), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.3), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.15);
            --modal-overlay: rgba(0, 0, 0, 0.6);
        }

        /* Light Theme Variables */
        [data-theme="light"] {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --card-bg-elevated: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border-color: #cbd5e1;
            --tag-bg: #e2e8f0;
            --bg-gradient: radial-gradient(circle at top center, #e2e8f0 0%, var(--bg-color) 100%);
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.05);
            --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.25);
            --modal-overlay: rgba(15, 23, 42, 0.4);
        }

        /* Font Size Scaling */
        html { font-size: 16px; transition: font-size 0.2s; }
        html[data-font-size="small"] { font-size: 14px; }
        html[data-font-size="large"] { font-size: 18px; }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            background-image: var(--bg-gradient);
            color: var(--text-primary);
            line-height: 1.5;
            padding: 1.5rem 1rem;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        /* Reduced Header & Icon */
        header {
            text-align: center;
            margin-bottom: 1.5rem;
            padding: 0.25rem 0;
            position: relative;
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 0.75rem;
            margin-bottom: 0.5rem;
            box-shadow: var(--shadow-glow);
            color: white;
        }

        .logo-container svg {
            width: 24px;
            height: 24px;
        }

        h1 {
            font-size: clamp(1.4rem, 4vw, 1.8rem);
            font-weight: 800;
            margin-bottom: 0.25rem;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
        }

        [data-theme="light"] h1 {
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .hidden { display: none !important; }

        /* Header Actions (Install & Settings) */
        .header-actions {
            position: absolute;
            top: 0;
            right: 0;
            display: flex;
            gap: 0.5rem;
            z-index: 10;
        }

        .header-btn {
            background-color: var(--card-bg-elevated);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 0.5rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .header-btn:hover {
            background-color: var(--border-color);
            transform: translateY(-2px);
        }

        .header-btn.install-btn {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .header-btn.install-btn:hover {
            background-color: var(--success-color);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .header-btn svg { width: 16px; height: 16px; }

        /* Search Panel */
        .search-panel {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1.25rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            color: var(--text-secondary);
            width: 18px;
            height: 18px;
            pointer-events: none;
        }

        .input-group input {
            flex: 1;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            border-radius: 1rem;
            font-size: 1rem;
            transition: all 0.2s;
            width: 100%;
            box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.05);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            background-color: var(--card-bg-elevated);
        }

        .add-btn {
            position: absolute;
            right: 0.4rem;
            width: 2.4rem;
            height: 2.4rem;
            border-radius: 0.75rem;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 6px rgba(59, 130, 246, 0.3);
        }

        .add-btn svg { width: 20px; height: 20px; }
        .add-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        .add-btn:active { transform: scale(0.95); }

        /* Selected Items */
        .selected-items-area {
            background-color: var(--bg-color);
            padding: 1rem;
            border-radius: 1rem;
            border: 1px dashed var(--border-color);
            min-height: 4rem;
        }
        
        .section-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .drug-tag {
            background-color: var(--tag-bg);
            color: var(--text-primary);
            padding: 0.4rem 0.6rem 0.4rem 0.875rem;
            border-radius: 9999px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .remove-tag {
            background: rgba(0, 0, 0, 0.1);
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 1.4rem;
            height: 1.4rem;
            border-radius: 50%;
            transition: all 0.2s;
        }

        [data-theme="light"] .remove-tag { background: rgba(0,0,0,0.05); }

        .remove-tag:hover {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--danger-color);
        }

        .remove-tag svg { width: 12px; height: 12px; }

        /* Check Button */
        .check-btn-container {
            display: flex;
            justify-content: stretch;
        }

        button#check-btn {
            background: linear-gradient(to right, var(--accent-color), #6366f1);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: var(--shadow-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button#check-btn svg { width: 18px; height: 18px; }

        button#check-btn:disabled {
            background: var(--tag-bg);
            color: var(--text-secondary);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        button#check-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
            filter: brightness(1.1);
        }

        /* Settings Modal */
        .modal {
            position: fixed;
            inset: 0;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        .modal.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .modal-overlay {
            position: absolute;
            inset: 0;
            background: var(--modal-overlay);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
        }

        .modal-content {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 1.25rem;
            padding: 1.5rem;
            width: 100%;
            max-width: 360px;
            box-shadow: var(--shadow-lg);
            transform: scale(1);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal.hidden .modal-content {
            transform: scale(0.95);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h3 { font-size: 1.25rem; margin: 0; }
        
        .close-btn { 
            background: var(--card-bg-elevated); 
            border: none; 
            color: var(--text-secondary); 
            width: 2rem; height: 2rem; 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: all 0.2s; 
        }
        .close-btn:hover { background: var(--border-color); color: var(--text-primary); }

        .settings-group { margin-bottom: 1.5rem; }
        .settings-group:last-child { margin-bottom: 0; }
        .settings-group label { 
            display: block; margin-bottom: 0.5rem; 
            color: var(--text-secondary); font-size: 0.85rem; 
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
        }
        
        .toggle-group { 
            display: flex; gap: 0.25rem; 
            background: var(--bg-color); padding: 0.35rem; 
            border-radius: 0.75rem; border: 1px solid var(--border-color); 
        }
        .toggle-btn { 
            flex: 1; padding: 0.5rem; border: none; 
            background: transparent; color: var(--text-primary); 
            border-radius: 0.5rem; cursor: pointer; 
            transition: all 0.2s; font-weight: 500; font-size: 0.9rem; 
        }
        .toggle-btn.active { 
            background: var(--card-bg); color: var(--accent-color); 
            box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); 
        }

        /* Alerts */
        .alert {
            padding: 0.875rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .alert-warning {
            background-color: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            color: #d97706;
        }
        [data-theme="dark"] .alert-warning { color: #fcd34d; }

        /* Results Area */
        .results-area { animation: fadeIn 0.4s ease-out; }
        .results-area h2 { font-size: 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }

        /* Tabs */
        .tabs-container {
            display: flex; gap: 0.5rem; margin-bottom: 1.25rem; padding-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            background-color: var(--bg-color); border: 1px solid var(--border-color);
            color: var(--text-secondary); font-size: 0.9rem; font-weight: 600;
            padding: 0.6rem 1rem; cursor: pointer; border-radius: 9999px;
            transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .tab-btn .badge {
            background-color: var(--tag-bg); padding: 0.15rem 0.5rem;
            border-radius: 9999px; font-size: 0.7rem; color: var(--text-secondary);
        }
        .tab-btn:hover { background-color: var(--card-bg-elevated); color: var(--text-primary); border-color: var(--text-secondary); }
        .tab-btn.active { background-color: rgba(59, 130, 246, 0.1); border-color: var(--accent-color); color: var(--accent-color); }
        .tab-btn.active .badge { background-color: var(--accent-color); color: white; }

        .tab-content { display: none !important; animation: slideUp 0.3s ease-out; }
        .tab-content.active { display: block !important; }

        /* Result Cards */
        .results-grid { display: flex; flex-direction: column; gap: 0.75rem; }
        
        .result-card {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 1rem; overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }
        .result-card:hover { box-shadow: var(--shadow); border-color: var(--text-secondary); }

        .result-header {
            padding: 1rem 1.25rem; cursor: pointer; display: flex;
            justify-content: space-between; align-items: center; gap: 1rem; user-select: none;
        }

        .group-title { font-size: 1.05rem; line-height: 1.4; color: var(--text-primary); }

        .compatibility-badge {
            font-size: 0.7rem; font-weight: 700; padding: 0.3rem 0.6rem;
            border-radius: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em;
            display: inline-flex; align-items: center; gap: 0.35rem; min-width: 5.5rem; justify-content: center;
        }

        .comp-c { background-color: rgba(16, 185, 129, 0.15); color: #059669; border: 1px solid rgba(16, 185, 129, 0.2); }
        .comp-i { background-color: rgba(239, 68, 68, 0.15); color: #dc2626; border: 1px solid rgba(239, 68, 68, 0.2); }
        .comp-u { background-color: rgba(245, 158, 11, 0.15); color: #d97706; border: 1px solid rgba(245, 158, 11, 0.2); }
        .comp-vi { background-color: rgba(239, 68, 68, 0.25); color: #b91c1c; border: 1px solid rgba(239, 68, 68, 0.3); }

        [data-theme="dark"] .comp-c { color: #34d399; }
        [data-theme="dark"] .comp-i { color: #f87171; }
        [data-theme="dark"] .comp-u { color: #fbbf24; }
        [data-theme="dark"] .comp-vi { color: #fca5a5; }

        .toggle-icon { color: var(--text-secondary); font-size: 0.9rem; transition: transform 0.3s ease; display: flex; align-items: center; }

        .group-details {
            background-color: var(--bg-color); border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
        }
        .group-details.hidden { display: none; }

        .condition-row { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border-color); }
        .condition-row:last-child { border-bottom: none; }
        .condition-header { display: flex; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.5rem; font-size: 0.95rem; color: var(--text-primary); }
        .status-dot { font-size: 1.2rem; line-height: .7; margin-top: -0.1em; }
        .condition-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 0.5rem; color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 0.75rem; }
        .condition-meta div { background-color: var(--card-bg); padding: 0.4rem 0.6rem; border-radius: 0.5rem; border: 1px solid var(--border-color); }

        .condition-note {
            font-style: italic; color: var(--text-secondary); background-color: rgba(59, 130, 246, 0.05);
            border-left: 3px solid var(--accent-color); padding: 0.6rem; margin-top: 0.5rem;
            border-radius: 0 0.5rem 0.5rem 0; font-size: 0.85rem; transition: all 0.3s ease;
        }
        .condition-note strong { color: var(--text-primary); font-style: normal; }
        .empty-state { color: var(--text-secondary); text-align: center; padding: 1rem; font-style: italic; width: 100%; font-size: 0.9rem; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }

        /* Mobile Tweaks */
        @media (max-width: 640px) {
            body { padding: 1rem 0.5rem 6.5rem; } /* Extra bottom padding for sticky button */
            
            header { text-align: left; display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
            .logo-container { margin-bottom: 0; width: 40px; height: 40px; }
            .logo-container svg { width: 20px; height: 20px; }
            .header-text { flex: 1; }
            h1 { font-size: 1.25rem; margin-bottom: 0; }
            p.subtitle { display: none; } /* Hide subtitle to save vertical space on mobile */

            .header-actions { position: relative; top: auto; right: auto; }
            .header-btn span { display: none; } /* Hide text in buttons, just show icons */

            .search-panel { padding: 1rem; border-radius: 1rem; margin-bottom: 1rem; gap: 1rem; }
            
            .input-group input { font-size: 16px; padding: 0.75rem 3.5rem 0.75rem 2.5rem; } /* 16px avoids iOS zoom */
            
            .check-btn-container {
                position: fixed; bottom: 1rem; left: 1rem; right: 1rem; z-index: 100;
            }
            button#check-btn {
                padding: 1.15rem;
                box-shadow: 0 -4px 20px var(--bg-color), 0 4px 15px rgba(59, 130, 246, 0.4);
            }

            .result-header { flex-direction: column; align-items: flex-start; gap: 0.75rem; position: relative; }
            .compatibility-badge { width: 100%; }
            .toggle-icon { position: absolute; right: 1.25rem; top: 1.25rem; }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2a2 2 0 0 1 2 2v2h2a2 2 0 0 1 2 2v2h1a1 1 0 0 1 1 1v6a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5v-6a1 1 0 0 1 1-1h1V8a2 2 0 0 1 2-2h2V4a2 2 0 0 1 2-2zm0 2h-2v2h2V4zm-2 4v2h4V8h-4zm-4 5v5a3 3 0 0 0 6 0v-5H6z"/>
                    <path d="M11 14h2v4h-2z" fill="white" opacity="0.8"/>
                </svg>
            </div>
            <div class="header-text">
                <h1>IV Compatibility</h1>
                <p class="subtitle">Check compatibility between multiple drugs and solutions instantly.</p>
            </div>
            
            <div class="header-actions">
                <button id="install-btn" class="header-btn install-btn hidden" aria-label="Install App">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    <span>Install App</span>
                </button>
                <button class="header-btn" aria-label="Settings" onclick="toggleSettings(true)">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
        </header>

        <main>
            <div id="status-message"></div>

            <div class="search-panel">
                <div class="input-group">
                    <label for="drug-search">Search & Add Drugs</label>
                    <div class="search-wrapper">
                        <!-- Search Icon -->
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        
                        <input type="text" id="drug-search" list="drug-list" placeholder="e.g. Heparin, Morphine..." autocomplete="off">
                        
                        <button id="add-btn" class="add-btn" title="Add to list">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                    </div>
                    <datalist id="drug-list"></datalist>
                </div>

                <div class="selected-items-area">
                    <p class="section-label">Selected Components</p>
                    <div id="selected-list" class="tags-container">
                        <span class="empty-state">No drugs selected yet. Search above to begin.</span>
                    </div>
                </div>

                <div class="check-btn-container">
                    <button id="check-btn" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        Check Compatibility
                    </button>
                </div>
            </div>

            <section id="results-area" class="results-area hidden">
                <h2>Results Overview</h2>
                <div id="tabs-container" class="tabs-container">
                    <!-- Tabs will be injected here -->
                </div>
                <div id="results-container">
                    <!-- Content will be injected here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-overlay" onclick="toggleSettings(false)"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Settings</h3>
                <button class="close-btn" onclick="toggleSettings(false)" aria-label="Close Settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="settings-group">
                <label>Appearance Theme</label>
                <div class="toggle-group">
                    <button id="theme-light" class="toggle-btn" onclick="setTheme('light')">Light</button>
                    <button id="theme-dark" class="toggle-btn" onclick="setTheme('dark')">Dark</button>
                </div>
            </div>
            <div class="settings-group">
                <label>Text Size</label>
                <div class="toggle-group">
                    <button id="font-small" class="toggle-btn" onclick="setFontSize('small')">Small</button>
                    <button id="font-medium" class="toggle-btn" onclick="setFontSize('medium')">Medium</button>
                    <button id="font-large" class="toggle-btn" onclick="setFontSize('large')">Large</button>
                </div>
            </div>
        </div>
    </div>
    
<script>
// --- Settings & Themes Logic ---
function toggleSettings(show) {
    const modal = document.getElementById('settings-modal');
    if (show) {
        modal.classList.remove('hidden');
    } else {
        modal.classList.add('hidden');
    }
}

function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('iv-theme', theme);
    document.querySelectorAll('[id^="theme-"]').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`theme-${theme}`).classList.add('active');
}

function setFontSize(size) {
    document.documentElement.setAttribute('data-font-size', size);
    localStorage.setItem('iv-fontsize', size);
    document.querySelectorAll('[id^="font-"]').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`font-${size}`).classList.add('active');
}

// Initialize Preferences
(function initPreferences() {
    const savedTheme = localStorage.getItem('iv-theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    const savedFontSize = localStorage.getItem('iv-fontsize') || 'medium';
    setTheme(savedTheme);
    setFontSize(savedFontSize);
})();


// --- PWA Install Logic ---
let deferredPrompt;
const installBtn = document.getElementById('install-btn');

// 1. Check if the app is already installed/running in standalone mode
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone || document.referrer.includes('android-app://');

// 2. If not installed, ensure the button is visible. This acts as a manual fallback for iOS and other non-supporting browsers.
if (!isStandalone) {
    installBtn.classList.remove('hidden');
}

// 3. Listen for the native Chromium install prompt event
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); 
    deferredPrompt = e;
    installBtn.classList.remove('hidden'); 
});

// 4. Handle installation button clicks
installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
        // Chromium based browsers
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            installBtn.classList.add('hidden');
        }
        deferredPrompt = null;
    } else {
        // Fallback instructions for iOS Safari and other non-supporting browsers
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        if (isIOS) {
            alert('To install on iOS: Tap the Share icon (square with an up arrow) at the bottom or top of your screen, then select "Add to Home Screen".');
        } else {
            alert('To install this app: Open your browser menu (usually three dots or lines) and select "Install App" or "Add to Home Screen".');
        }
    }
});

// 5. Hide button once successfully installed
window.addEventListener('appinstalled', () => {
    installBtn.classList.add('hidden');
});

// 6. Dummy Service Worker registration to satisfy strict browser PWA requirements if hosted
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        // Will fail silently locally if sw.js is missing, but required for strict PWA environments on servers.
        navigator.serviceWorker.register('sw.js').catch(() => {});
    });
}


// --- App Core Logic ---
const drugSearchInput = document.getElementById('drug-search');
const drugList = document.getElementById('drug-list');
const selectedListContainer = document.getElementById('selected-list');
const addBtn = document.getElementById('add-btn');
const checkBtn = document.getElementById('check-btn');
const resultsArea = document.getElementById('results-area');
const tabsContainer = document.getElementById('tabs-container');
const resultsContainer = document.getElementById('results-container');
const statusMessage = document.getElementById('status-message');

const badgeIcons = {
    'C': `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`,
    'I': `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`,
    'U': `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`,
    'VI': `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`
};

const resultMapping = {
    'C': { text: 'Compatible', class: 'comp-c', icon: badgeIcons['C'] },
    'I': { text: 'Incompatible', class: 'comp-i', icon: badgeIcons['I'] },
    'U': { text: 'Uncertain', class: 'comp-u', icon: badgeIcons['U'] },
    '?': { text: 'Unknown', class: 'comp-u', icon: badgeIcons['U'] },
    'V': { text: 'Variable', class: 'comp-u', icon: badgeIcons['U'] },
    'VI': { text: 'Variable / Incompatible', class: 'comp-vi', icon: badgeIcons['VI'] }
};

let allDrugOptions = [];
let selectedItems = new Set();
let ALL_INTERACTIONS = [];

// Data Initializer
(async () => {
    try {
        const response = await fetch('data.json');
        if (!response.ok) throw new Error('Failed to load data.json');
        const rawData = await response.json();
        
        ALL_INTERACTIONS = rawData.data.map(row => {
            let obj = {};
            rawData.keys.forEach((k, i) => {
                const val = row[i];
                obj[k] = val !== null ? rawData.pool[val] : null;
            });
            return obj;
        });
        await fetchAllOptions();
    } catch (err) {
        console.warn('Injecting demo data for preview purposes.', err);
        showWarning("Running in Demo Mode. Real 'data.json' could not be loaded.");
        injectDemoData();
        await fetchAllOptions();
    }
})();

function showWarning(msg) {
    statusMessage.innerHTML = `
        <div class="alert alert-warning">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            ${msg}
        </div>
    `;
}

function injectDemoData() {
    ALL_INTERACTIONS = [
        { drug1_name: "Morphine", drug2_name: "Heparin", result: "C", is_ysite: "1", is_admix: "0", drug1_conc: "1 mg/mL", drug2_conc: "100 units/mL", compatibility: "Clear", stability: "Stable for 24h" },
        { drug1_name: "Morphine", drug2_name: "Pantoprazole", result: "I", is_ysite: "1", is_admix: "0", drug1_conc: "5 mg/mL", drug2_conc: "4 mg/mL", compatibility: "Precipitate forms immediately", notes: "Do not mix." },
        { drug1_name: "Heparin", drug2_name: "Gentamicin", result: "I", is_ysite: "0", is_admix: "1", drug1_conc: "10 units/mL", drug2_conc: "2 mg/mL", compatibility: "Micro-precipitate" },
        { drug1_name: "Amiodarone", drug2_name: "Heparin", result: "VI", is_ysite: "1", is_admix: "1", drug1_conc: "Varies", drug2_conc: "Varies", compatibility: "Variable depending on concentration.", notes: "Consult pharmacy." }
    ];
}

async function fetchAllOptions() {
    const d1 = ALL_INTERACTIONS.map(i => i.drug1_name);
    const d2 = ALL_INTERACTIONS.map(i => i.drug2_name);
    allDrugOptions = Array.from(new Set([...d1, ...d2])).sort();
    populateDataList(drugList, allDrugOptions);
}

function populateDataList(datalist, options) {
    datalist.innerHTML = '';
    const fragment = document.createDocumentFragment();
    options.forEach(option => {
        if(option) {
            const op = document.createElement('option');
            op.value = option;
            fragment.appendChild(op);
        }
    });
    datalist.appendChild(fragment);
}

function addItem() {
    const val = drugSearchInput.value.trim();
    if (!val) return;

    if (selectedItems.has(val)) {
        drugSearchInput.value = '';
        return;
    }

    selectedItems.add(val);
    renderSelectedItems();
    drugSearchInput.value = '';
    drugSearchInput.focus();
}

addBtn.addEventListener('click', addItem);
drugSearchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addItem();
});

function renderSelectedItems() {
    selectedListContainer.innerHTML = '';
    if (selectedItems.size === 0) {
        selectedListContainer.innerHTML = '<span class="empty-state">No drugs selected yet. Search above to begin.</span>';
        checkBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> Check Compatibility`;
        checkBtn.disabled = true;
        return;
    }

    selectedItems.forEach(item => {
        const tag = document.createElement('div');
        tag.className = 'drug-tag';
        tag.innerHTML = `
            <span>${escapeHtml(item)}</span>
            <button class="remove-tag" onclick="removeItem('${escapeHtml(item)}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        `;
        selectedListContainer.appendChild(tag);
    });

    if (selectedItems.size === 1) {
        checkBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg> Find Issues for ${Array.from(selectedItems)[0]}`;
        checkBtn.disabled = false;
    } else {
        checkBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> Check Compatibility`;
        checkBtn.disabled = false;
    }
}

window.removeItem = (item) => {
    selectedItems.delete(item);
    renderSelectedItems();
};

checkBtn.addEventListener('click', () => {
    if (selectedItems.size === 0) return;

    checkBtn.disabled = true;
    const originalHTML = checkBtn.innerHTML;
    checkBtn.innerHTML = `<svg class="spin" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg> Checking...`;
    
    if(!document.getElementById('spinner-css')) {
        const style = document.createElement('style');
        style.id = 'spinner-css';
        style.innerHTML = `@keyframes spin { 100% { transform: rotate(360deg); } } .spin { animation: spin 1s linear infinite; }`;
        document.head.appendChild(style);
    }

    resultsArea.classList.add('hidden');
    tabsContainer.innerHTML = '';
    resultsContainer.innerHTML = '';

    setTimeout(() => {
        try {
            if (selectedItems.size === 1) {
                const drug = Array.from(selectedItems)[0];
                const results = ALL_INTERACTIONS.filter(i => 
                    (i.drug1_name === drug || i.drug2_name === drug) && i.result === 'I'
                );
                renderResultsWithTabs(results, drug);
            } else {
                const drugs = Array.from(selectedItems);
                const results = ALL_INTERACTIONS.filter(i => 
                    drugs.includes(i.drug1_name) && drugs.includes(i.drug2_name)
                );
                renderResultsWithTabs(results, null);
            }
        } catch (err) {
            console.error('Error:', err);
            resultsContainer.innerHTML = '<p class="empty-state">An error occurred while checking compatibility.</p>';
            resultsArea.classList.remove('hidden');
        } finally {
            checkBtn.innerHTML = originalHTML;
            checkBtn.disabled = false;
        }
    }, 300); 
});

function renderResultsWithTabs(results, targetDrug) {
    if (results.length === 0) {
        resultsContainer.innerHTML = targetDrug
            ? `<p class="empty-state">✅ No known incompatibilities found in database for <strong>${escapeHtml(targetDrug)}</strong>.</p>`
            : '<p class="empty-state">✅ No known interactions found between the selected items.</p>';
        resultsArea.classList.remove('hidden');
        return;
    }

    const partitions = { 'Y-Site': [], 'Admixture': [], 'Syringe': [], 'Solution': [], 'TPN/TNA': [], 'Other': [] };

    results.forEach(item => {
        let added = false;
        if (item.is_ysite == '1') { partitions['Y-Site'].push(item); added = true; }
        if (item.is_admix == '1') { partitions['Admixture'].push(item); added = true; }
        if (item.is_syringe == '1') { partitions['Syringe'].push(item); added = true; }
        if (item.is_solution == '1') { partitions['Solution'].push(item); added = true; }
        if (item.is_tpntna == '1') { partitions['TPN/TNA'].push(item); added = true; }
        if (!added) partitions['Other'].push(item);
    });

    let firstTab = true;
    ['Y-Site', 'Admixture', 'Syringe', 'Solution', 'TPN/TNA', 'Other'].forEach(type => {
        const items = partitions[type];
        if (items.length === 0) return;

        const safeId = type.replace(/[^a-zA-Z0-9]/g, '-');
        const tabBtn = document.createElement('button');
        tabBtn.className = `tab-btn ${firstTab ? 'active' : ''}`;
        tabBtn.dataset.tab = safeId;
        tabBtn.innerHTML = `${type} <span class="badge">${items.length}</span>`;

        tabBtn.addEventListener('click', () => window.switchTab(safeId));
        tabsContainer.appendChild(tabBtn);

        const contentDiv = document.createElement('div');
        contentDiv.id = `tab-${safeId}`;
        contentDiv.className = `tab-content results-grid ${firstTab ? 'active' : ''}`;
        renderSubset(contentDiv, items, targetDrug, type);
        resultsContainer.appendChild(contentDiv);
        
        firstTab = false;
    });

    resultsArea.classList.remove('hidden');
    resultsArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

window.switchTab = (tabId) => {
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabId);
    });
    document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.toggle('active', content.id === `tab-${tabId}`);
    });
};

function renderSubset(container, items, targetDrug, typeName) {
    const groups = {};
    items.forEach(item => {
        const [d1, d2] = [item.drug1_name, item.drug2_name].sort();
        const key = `${d1}|${d2}`;

        if (!groups[key]) {
            groups[key] = { d1, d2, type: typeName, items: [], statusSet: new Set() };
        }
        groups[key].items.push(item);
        groups[key].statusSet.add(item.result);
    });

    Object.values(groups)
        .sort((a, b) => targetDrug 
            ? ((a.d1 === targetDrug ? a.d2 : a.d1).localeCompare(b.d1 === targetDrug ? b.d2 : b.d1))
            : (a.d1.localeCompare(b.d1) || a.d2.localeCompare(b.d2)))
        .forEach(group => container.appendChild(createGroupCard(group, targetDrug)));
}

const makeNote = (label, text) => text ? `<div class="condition-note"><strong>${label}:</strong> <span>${escapeHtml(text)}</span></div>` : '';

function createGroupCard(group, targetDrug) {
    const card = document.createElement('div');
    card.className = 'result-card group-card';

    let overallStatus = '?';
    if (group.statusSet.has('I')) {
        overallStatus = (group.statusSet.has('C') || group.statusSet.has('U')) ? 'VI' : 'I';
    } else if (group.statusSet.has('U')) {
        overallStatus = 'U';
    } else if (group.statusSet.has('C')) {
        overallStatus = 'C';
    }
    if (group.statusSet.size > 1 && !['VI', 'I'].includes(overallStatus) && group.statusSet.has('C') && group.statusSet.has('U')) {
        overallStatus = 'V';
    }

    const mappedResult = resultMapping[overallStatus] || { text: overallStatus, class: '', icon: '' };
    const titleHtml = targetDrug 
        ? `<strong>${escapeHtml(group.d1 === targetDrug ? group.d2 : group.d1)}</strong>`
        : `<strong>${escapeHtml(group.d1)}</strong> <span style="color: var(--text-secondary); margin: 0 4px;">+</span> <strong>${escapeHtml(group.d2)}</strong>`;

    const headerHtml = `
        <div class="result-header" onclick="window.toggleGroup(this)">
            <div>
                <div class="group-title">${titleHtml}</div>
                <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px;">
                    ${group.items.length} condition${group.items.length > 1 ? 's' : ''}
                </div>
            </div>
            <div style="display:flex; align-items:center; gap: 1rem;">
                <span class="compatibility-badge ${mappedResult.class}">
                    ${mappedResult.icon}
                    ${mappedResult.text}
                </span>
                <span class="toggle-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></span>
            </div>
        </div>
    `;

    let detailsHtml = '<div class="group-details hidden">';
    group.items.forEach((item, index) => {
        const itemStatus = resultMapping[item.result] || { text: item.result, class: '' };
        detailsHtml += `
            <div class="condition-row">
                 <div class="condition-header">
                    <span class="status-dot ${itemStatus.class}" title="${itemStatus.text}">●</span>
                    <span>${index + 1}. <strong>${escapeHtml(item.drug1_conc || 'Unspec. Conc')}</strong> + <strong>${escapeHtml(item.drug2_conc || 'Unspec. Conc')}</strong></span>
                 </div>
                 <div class="condition-meta">
                    ${item.drug1_vehicle ? `<div>Vehicle: ${escapeHtml(item.drug1_vehicle)}</div>` : ''}
                    ${item.container ? `<div>Container: ${escapeHtml(item.container)}</div>` : ''}
                    ${item.storage ? `<div>Storage: ${escapeHtml(item.storage)}</div>` : ''}
                    ${item.study_period ? `<div>Time: ${escapeHtml(item.study_period)}</div>` : ''}
                 </div>
                  ${makeNote('Physical', item.compatibility)}
                  ${makeNote('Chemical', item.stability)}
                  ${makeNote('Note', item.notes)}
            </div>
        `;
    });
    detailsHtml += '</div>';

    card.innerHTML = headerHtml + detailsHtml;
    return card;
}

window.toggleGroup = (headerElement) => {
    const details = headerElement.nextElementSibling;
    const icon = headerElement.querySelector('.toggle-icon');
    const isHidden = details.classList.contains('hidden');
    
    details.classList.toggle('hidden');
    icon.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
};

function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}
</script>
</body>
</html>

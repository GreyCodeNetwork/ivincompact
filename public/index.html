<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-touch-icon" content="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <title>IV Compatibility Checker</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>IV Compatibility Checker</h1>
            <p>Check compatibility between multiple drugs and solutions.</p>
            <button id="install-btn" class="install-btn hidden" style="margin-top: 1rem;">⬇ Install App</button>
        </header>

        <main>
            <div class="search-panel">
                <div class="input-group">
                    <label for="drug-search">Add Drug or Solution</label>
                    <div class="search-row">
                        <input type="text" id="drug-search" list="drug-list" placeholder="Search to add...">
                        <button id="add-btn" class="icon-btn" title="Add to list">+</button>
                    </div>
                    <datalist id="drug-list"></datalist>
                </div>

                <div class="selected-items-area">
                    <p class="section-label">Selected Components:</p>
                    <div id="selected-list" class="tags-container">
                        <!-- Tags will appear here -->
                        <span class="empty-state">No drugs selected</span>
                    </div>
                </div>

                <button id="check-btn" disabled>Check Compatibility</button>
            </div>

            <section id="results-area" class="results-area hidden">
                <h2>Compatibility Results</h2>
                <div id="tabs-container" class="tabs-container">
                    <!-- Tabs will be injected here -->
                </div>
                <div id="results-container">
                    <!-- Content will be injected here -->
                </div>
            </section>
        </main>

        <footer>
            <p>Data derived from iMDX_IVComp Database</p>
        </footer>
    </div>
    <script src="app.js?v=2"></script>
</body>

</html>

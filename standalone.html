<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-touch-icon" content="icon-192.png">
    
    <title>IV Compatibility Checker</title>
    <style>:root {
    --bg-color: #0f172a;
    --card-bg: #1e293b;
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --accent-color: #3b82f6;
    --accent-hover: #2563eb;
    --success-color: #10b981;
    --danger-color: #ef4444;
    --warning-color: #f59e0b;
    --border-color: #334155;
    --tag-bg: #2d3748;
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-primary);
    line-height: 1.5;
    padding: 1rem;
    min-height: 100vh;
}

.container {
    width: 100%;
    max-width: 1000px;
    margin: 0 auto;
}

header {
    text-align: center;
    margin-bottom: 2rem;
    padding: 1rem 0;
}

h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.025em;
}

p.subtitle {
    color: var(--text-secondary);
    font-size: 1.1rem;
    max-width: 600px;
    margin: 0 auto;
}

.hidden {
    display: none !important;
}

.install-btn {
    background-color: var(--success-color);
    color: white;
    border: none;
    padding: 0.5rem 1.25rem;
    border-radius: 9999px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 2px 4px -1px rgba(16, 185, 129, 0.2);
}

.install-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.4);
    filter: brightness(1.1);
}

/* Search Panel */
.search-panel {
    background-color: var(--card-bg);
    padding: 1.5rem;
    border-radius: 1rem;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border-color);
    margin-bottom: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
}

.input-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.search-row {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    /* Center input/button vertically */
}

.input-group label {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.input-group input {
    flex: 1;
    background-color: var(--bg-color);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    padding: 0.875rem 1rem;
    border-radius: 0.75rem;
    font-size: 1rem;
    /* prevent iOS zoom */
    transition: all 0.2s;
    min-width: 0;
    /* Prevent overflow */
    box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.05);
}

.input-group input:focus {
    outline: none;
    border-color: var(--accent-color);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
}

/* Redesigned Plus Button */
.icon-btn.add-btn {
    width: 3.5rem;
    height: 3.5rem;
    flex-shrink: 0;
    border-radius: 50%;
    /* Circle */
    background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
    color: white;
    font-size: 1.75rem;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3), 0 2px 4px -1px rgba(59, 130, 246, 0.06);
    position: relative;
    overflow: hidden;
}

.icon-btn.add-btn::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(255, 255, 255, 0.1);
    opacity: 0;
    transition: opacity 0.2s;
}

.icon-btn.add-btn:hover {
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4), 0 4px 6px -2px rgba(59, 130, 246, 0.1);
}

.icon-btn.add-btn:hover::after {
    opacity: 1;
}

.icon-btn.add-btn:active {
    transform: translateY(0) scale(0.95);
    box-shadow: 0 2px 4px -1px rgba(59, 130, 246, 0.2);
}

/* Selected Items */
.selected-items-area {
    background-color: rgba(15, 23, 42, 0.5);
    padding: 1rem;
    border-radius: 0.75rem;
    border: 1px dashed var(--border-color);
    min-height: 3.5rem;
}

.drug-tag {
    background-color: var(--tag-bg);
    color: var(--text-primary);
    padding: 0.5rem 1rem;
    border-radius: 9999px;
    font-size: 0.95rem;
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
    margin: 0.25rem;
    transition: transform 0.2s;
}

.drug-tag:hover {
    transform: translateY(-1px);
    border-color: var(--text-secondary);
}

.remove-tag {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 1.25rem;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 1.25rem;
    height: 1.25rem;
    border-radius: 50%;
}

.remove-tag:hover {
    background-color: rgba(239, 68, 68, 0.2);
    color: var(--danger-color);
}

/* Action Button */
button#check-btn {
    background: linear-gradient(to right, var(--accent-color), var(--accent-hover));
    color: white;
    border: none;
    padding: 1rem 2rem;
    border-radius: 0.75rem;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    box-shadow: var(--shadow);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
}

button#check-btn:disabled {
    background: var(--tag-bg);
    color: var(--text-secondary);
    cursor: not-allowed;
    box-shadow: none;
    text-shadow: none;
}

button#check-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
}

button#check-btn:active:not(:disabled) {
    transform: translateY(0);
}

/* Tabs */
.tabs-container {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 2rem;
    padding-bottom: 0.5rem;
    overflow-x: auto;
    scrollbar-width: none;
    /* Firefox */
    -ms-overflow-style: none;
    /* IE/Edge */
    mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
    webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
}

.tabs-container::-webkit-scrollbar {
    display: none;
}

.tab-btn {
    background-color: var(--card-bg);
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    font-size: 0.95rem;
    font-weight: 600;
    padding: 0.75rem 1.25rem;
    cursor: pointer;
    border-radius: 9999px;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
}

.tab-btn:hover {
    background-color: var(--tag-bg);
    color: var(--text-primary);
    border-color: var(--text-secondary);
}

.tab-btn.active {
    background-color: var(--accent-color);
    border-color: var(--accent-color);
    color: white;
    box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
}

/* Results Content - Forceful visibility control */
.tab-content {
    display: none !important;
    animation: fadeIn 0.4s ease-out;
}

.tab-content.active {
    display: block !important;
}

.tab-content.active.results-grid {
    display: grid !important;
}


/* Results Area */
.results-area {
    animation: fadeIn 0.4s ease-out;
}

.results-area h2 {
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.results-area h2::before {
    content: '';
    display: block;
    width: 4px;
    height: 1.5rem;
    background-color: var(--accent-color);
    border-radius: 2px;
}

/* Responsive Grid for Cards */
.results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
}

.result-card {
    background-color: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 1rem;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    display: flex;
    flex-direction: column;
}

.result-card:hover {
    box-shadow: var(--shadow-lg);
    border-color: var(--text-secondary);
    transform: translateY(-2px);
}

.result-header {
    padding: 1.25rem;
    cursor: pointer;
    background-color: var(--card-bg);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    /* Align top for multi-line titles */
    gap: 1rem;
}

.group-title {
    font-size: 1.1rem;
    line-height: 1.4;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
}

.type-badge-area {
    display: flex;
    gap: 0.5rem;
    align-items: center;
}

.count-badge {
    font-size: 0.75rem;
    background-color: rgba(255, 255, 255, 0.05);
    color: var(--text-secondary);
    padding: 0.15rem 0.6rem;
    border-radius: 9999px;
    border: 1px solid var(--border-color);
}

/* Status Badges */
.compatibility-badge {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.35rem 0.75rem;
    border-radius: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: inline-block;
    text-align: center;
    min-width: 6rem;
}

.comp-c {
    background-color: rgba(16, 185, 129, 0.15);
    color: #34d399;
    border: 1px solid rgba(16, 185, 129, 0.2);
}

.comp-i {
    background-color: rgba(239, 68, 68, 0.15);
    color: #f87171;
    border: 1px solid rgba(239, 68, 68, 0.2);
}

.comp-u {
    background-color: rgba(245, 158, 11, 0.15);
    color: #fbbf24;
    border: 1px solid rgba(245, 158, 11, 0.2);
}

.comp-vi {
    background-color: rgba(239, 68, 68, 0.25);
    color: #fca5a5;
    border: 1px solid rgba(239, 68, 68, 0.3);
}

.toggle-icon {
    color: var(--text-secondary);
    font-size: 0.9rem;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Details Section */
.group-details {
    background-color: #162032;
    border-top: 1px solid var(--border-color);
    padding: 0;
    font-size: 0.9rem;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease-out;
    /* Smooth Expand */
}

/* When active, set max-height large enough via JS or keep simple block/none */
.group-details:not(.hidden) {
    max-height: 1000px;
    /* Arbitrary large height */
    overflow-y: auto;
}

.condition-row {
    padding: 1rem;
    border-bottom: 1px solid var(--border-color);
}

.condition-row:last-child {
    border-bottom: none;
}

.condition-header {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
    font-size: 0.95rem;
    color: var(--text-primary);
}

.status-dot {
    font-size: 1.5rem;
    /* Larger dot */
    line-height: .7;
    margin-top: -0.1em;
}

.condition-meta {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 0.75rem;
    color: var(--text-secondary);
    font-size: 0.85rem;
    margin-bottom: 0.75rem;
}

.condition-meta div {
    background-color: rgba(255, 255, 255, 0.03);
    padding: 0.4rem 0.6rem;
    border-radius: 0.4rem;
}

.condition-note {
    font-style: italic;
    color: #cbd5e1;
    background-color: rgba(59, 130, 246, 0.1);
    border-left: 3px solid var(--accent-color);
    padding: 0.5rem 0.75rem;
    margin-top: 0.5rem;
    border-radius: 0 0.25rem 0.25rem 0;
    font-size: 0.85rem;
    transition: all 0.3s ease;
}

.condition-note.compressed {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    cursor: pointer;
}

.condition-note.expanded {
    display: block;
    cursor: pointer;
}

/* Empty State */
.empty-state {
    color: var(--text-secondary);
    text-align: center;
    padding: 2rem;
    font-style: italic;
}

/* Type Badges */
.type-badge {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.15rem 0.6rem;
    border-radius: 0.25rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.type-ysite {
    background: rgba(59, 130, 246, 0.15);
    color: #60a5fa;
    border: 1px solid rgba(59, 130, 246, 0.25);
}

.type-admix {
    background: rgba(168, 85, 247, 0.15);
    color: #c084fc;
    border: 1px solid rgba(168, 85, 247, 0.25);
}

.type-syringe {
    background: rgba(20, 184, 166, 0.15);
    color: #2dd4bf;
    border: 1px solid rgba(20, 184, 166, 0.25);
}

.type-solution {
    background: rgba(6, 182, 212, 0.15);
    color: #22d3ee;
    border: 1px solid rgba(6, 182, 212, 0.25);
}

.type-tpn {
    background: rgba(245, 158, 11, 0.15);
    color: #fbbf24;
    border: 1px solid rgba(245, 158, 11, 0.25);
}

.type-other {
    background: rgba(100, 116, 139, 0.15);
    color: #94a3b8;
    border: 1px solid rgba(100, 116, 139, 0.25);
}

/* Keyframes */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Mobile Tweaks */
@media (max-width: 640px) {
    body {
        padding: 0.5rem;
        padding-bottom: 5rem; /* Safe area for mobile browsers */
    }

    .search-panel {
        padding: 1rem;
        border-radius: 0.75rem;
    }

    h1 {
        font-size: 2rem;
    }

    /* Search row stays in one line */
    .search-row {
        gap: 0.5rem;
        /* flex-direction defaults to row, which we want */
    }

    .input-group input {
        font-size: 16px; /* Explicit for iOS to prevent zoom */
        padding: 0.8rem;
    }

    .icon-btn.add-btn {
        /* Adjust size slightly for mobile but keep circular */
        width: 3.5rem;
        height: 3.5rem;
        font-size: 1.5rem;
        margin: 0;
    }

    button#check-btn {
        font-size: 1rem;
        padding: 1rem;
    }

    .result-header {
        flex-direction: column;
        align-items: stretch;
        gap: 0.5rem;
    }

    .compatibility-badge {
        width: 100%;
        margin-top: 0.5rem;
    }

    .tabs-container {
        padding-left: 0.5rem;
        padding-right: 0.5rem;
        margin-left: -0.5rem;
        margin-right: -0.5rem;
    }
}</style>

<body>
    <div class="container">
        <header>
            <h1>IV Compatibility Checker</h1>
            <p>Check compatibility between multiple drugs and solutions.</p>
            
        </header>

        <main>
            <div class="search-panel">
                <div class="input-group">
                    <label for="drug-search">Add Drug or Solution</label>
                    <div class="search-row">
                        <input type="text" id="drug-search" list="drug-list" placeholder="Search to add...">
                        <button id="add-btn" class="icon-btn" title="Add to list">+</button>
                    </div>
                    <datalist id="drug-list"></datalist>
                </div>

                <div class="selected-items-area">
                    <p class="section-label">Selected Components:</p>
                    <div id="selected-list" class="tags-container">
                        <!-- Tags will appear here -->
                        <span class="empty-state">No drugs selected</span>
                    </div>
                </div>

                <button id="check-btn" disabled>Check Compatibility</button>
            </div>

            <section id="results-area" class="results-area hidden">
                <h2>Compatibility Results</h2>
                <div id="tabs-container" class="tabs-container">
                    <!-- Tabs will be injected here -->
                </div>
                <div id="results-container">
                    <!-- Content will be injected here -->
                </div>
            </section>
        </main>

        <footer>
            <p>Data derived from iMDX_IVComp Database</p>
        </footer>
    </div>
    

<script>
const drugSearchInput = document.getElementById('drug-search');
const drugList = document.getElementById('drug-list');
const selectedListContainer = document.getElementById('selected-list');
const addBtn = document.getElementById('add-btn');
const checkBtn = document.getElementById('check-btn');
const resultsArea = document.getElementById('results-area');
const tabsContainer = document.getElementById('tabs-container');
const resultsContainer = document.getElementById('results-container');

// Map result codes to readable text and CSS classes
const resultMapping = {
    'C': { text: 'Compatible', class: 'comp-c' },
    'I': { text: 'Incompatible', class: 'comp-i' },
    'U': { text: 'Uncertain', class: 'comp-u' },
    '?': { text: 'Unknown', class: 'comp-u' },
    'V': { text: 'Variable', class: 'comp-u' },
    'VI': { text: 'Variable (Has Incompatibility)', class: 'comp-vi' }
};

// Application State
let allDrugOptions = [];
let selectedItems = new Set();
let drugSet = new Set();

let ALL_INTERACTIONS = [];

// Initialize
(async () => {
    try {
        console.log('Fetching database...');
        const response = await fetch('data.json');
        if (!response.ok) throw new Error('Failed to load data.json');
        const rawData = await response.json();
        
        console.log('Decoding compressed database...');
        ALL_INTERACTIONS = rawData.data.map(row => {
            let obj = {};
            rawData.keys.forEach((k, i) => {
                const val = row[i];
                obj[k] = val !== null ? rawData.pool[val] : null;
            });
            return obj;
        });
        console.log('Database loaded locally with ' + ALL_INTERACTIONS.length + ' records.');

        await fetchAllOptions();
    } catch (err) {
        console.error('Failed to load initial data:', err);
        alert('Failed to load drug database. Please try reloading the page.');
    }
})();

// Fetch Combined List locally
async function fetchAllOptions() {
    try {
        const d1 = ALL_INTERACTIONS.map(i => i.drug1_name);
        const d2 = ALL_INTERACTIONS.map(i => i.drug2_name);
        
        const combined = new Set([...d1, ...d2]);
        allDrugOptions = Array.from(combined).sort();
        drugSet = new Set(allDrugOptions);

        populateDataList(drugList, allDrugOptions);
    } catch (err) {
        console.error(err);
    }
}

function populateDataList(datalist, options) {
    datalist.innerHTML = '';
    const fragment = document.createDocumentFragment();
    options.forEach(option => {
        const op = document.createElement('option');
        op.value = option;
        fragment.appendChild(op);
    });
    datalist.appendChild(fragment);
}

function addItem() {
    const val = drugSearchInput.value.trim();
    if (!val) return;

    if (selectedItems.has(val)) {
        drugSearchInput.value = '';
        return;
    }

    selectedItems.add(val);
    renderSelectedItems();
    drugSearchInput.value = '';
    drugSearchInput.focus();
}

addBtn.addEventListener('click', addItem);
drugSearchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        addItem();
    }
});

function renderSelectedItems() {
    selectedListContainer.innerHTML = '';
    if (selectedItems.size === 0) {
        selectedListContainer.innerHTML = '<span class="empty-state">No drugs selected</span>';
        checkBtn.textContent = 'Check Compatibility';
        checkBtn.disabled = true;
        return;
    }

    selectedItems.forEach(item => {
        const tag = document.createElement('div');
        tag.className = 'drug-tag';
        tag.innerHTML = `
            <span>${escapeHtml(item)}</span>
            <button class="remove-tag" onclick="removeItem('${escapeHtml(item)}')">&times;</button>
        `;
        selectedListContainer.appendChild(tag);
    });

    if (selectedItems.size === 1) {
        const drugName = Array.from(selectedItems)[0];
        checkBtn.textContent = `Find Incompatibilities for ${drugName}`;
        checkBtn.disabled = false;
    } else {
        checkBtn.textContent = 'Check Compatibility';
        checkBtn.disabled = false;
    }
}

window.removeItem = (item) => {};

selectedListContainer.addEventListener('click', (e) => {
    if (e.target.classList.contains('remove-tag')) {
        const span = e.target.previousElementSibling;
        const val = span.textContent;
        selectedItems.delete(val);
        renderSelectedItems();
    }
});


checkBtn.addEventListener('click', async () => {
    if (selectedItems.size === 0) return;

    checkBtn.disabled = true;
    const originalText = checkBtn.textContent;
    checkBtn.textContent = 'Checking...';
    resultsArea.classList.add('hidden');

    tabsContainer.innerHTML = '';
    resultsContainer.innerHTML = '';

    // Defer execution lightly to allow UI update
    setTimeout(() => {
        try {
            if (selectedItems.size === 1) {
                const drug = Array.from(selectedItems)[0];
                const results = ALL_INTERACTIONS.filter(i => 
                    (i.drug1_name === drug || i.drug2_name === drug) && i.result === 'I'
                );
                renderResultsWithTabs(results, drug);
            } else {
                const drugs = Array.from(selectedItems);
                const results = ALL_INTERACTIONS.filter(i => 
                    drugs.includes(i.drug1_name) && drugs.includes(i.drug2_name)
                );
                renderResultsWithTabs(results, null);
            }
        } catch (err) {
            console.error('Error:', err);
            resultsContainer.innerHTML = '<p class="error">An error occurred. Please try again.</p>';
            resultsArea.classList.remove('hidden');
        } finally {
            checkBtn.textContent = originalText;
            checkBtn.disabled = false;
        }
    }, 50);
});

function sanitizeId(str) {
    return str.replace(/[^a-zA-Z0-9]/g, '-');
}

function renderResultsWithTabs(results, targetDrug) {
    if (results.length === 0) {
        resultsContainer.innerHTML = targetDrug
            ? `<p>No incompatibilities found for <strong>${escapeHtml(targetDrug)}</strong>.</p>`
            : '<p>No interactions found between the selected items.</p>';
        resultsArea.classList.remove('hidden');
        return;
    }

    const partitions = {
        'Y-Site': [],
        'Admixture': [],
        'Syringe': [],
        'Solution': [],
        'TPN/TNA': [],
        'Other': []
    };

    results.forEach(item => {
        let added = false;
        if (item.is_ysite == '1') { partitions['Y-Site'].push(item); added = true; }
        if (item.is_admix == '1') { partitions['Admixture'].push(item); added = true; }
        if (item.is_syringe == '1') { partitions['Syringe'].push(item); added = true; }
        if (item.is_solution == '1') { partitions['Solution'].push(item); added = true; }
        if (item.is_tpntna == '1') { partitions['TPN/TNA'].push(item); added = true; }

        if (!added) partitions['Other'].push(item);
    });

    let firstTab = true;
    const typeOrder = ['Y-Site', 'Admixture', 'Syringe', 'Solution', 'TPN/TNA', 'Other'];

    typeOrder.forEach(type => {
        const items = partitions[type];
        if (items.length === 0) return;

        const safeId = sanitizeId(type);

        const tabBtn = document.createElement('button');
        tabBtn.className = `tab-btn ${firstTab ? 'active' : ''}`;
        tabBtn.dataset.tab = safeId;
        tabBtn.textContent = `${type} (${items.length})`;

        tabBtn.addEventListener('click', function () {
            window.switchTab(safeId);
        });

        tabsContainer.appendChild(tabBtn);

        const contentDiv = document.createElement('div');
        contentDiv.id = `tab-${safeId}`;
        contentDiv.className = `tab-content results-grid ${firstTab ? 'active' : ''}`;

        renderSubset(contentDiv, items, targetDrug, type);

        resultsContainer.appendChild(contentDiv);
        firstTab = false;
    });

    resultsArea.classList.remove('hidden');
}

window.switchTab = (tabId) => {
    document.querySelectorAll('.tab-btn').forEach(btn => {
        if (btn.dataset.tab === tabId) btn.classList.add('active');
        else btn.classList.remove('active');
    });

    document.querySelectorAll('.tab-content').forEach(content => {
        if (content.id === `tab-${tabId}`) content.classList.add('active');
        else content.classList.remove('active');
    });
};

function renderSubset(container, items, targetDrug, typeName) {
    const groups = {};
    items.forEach(item => {
        const [d1, d2] = [item.drug1_name, item.drug2_name].sort();
        const key = `${d1}|${d2}`;

        if (!groups[key]) {
            groups[key] = {
                d1, d2,
                type: typeName,
                items: [],
                statusSet: new Set()
            };
        }
        groups[key].items.push(item);
        groups[key].statusSet.add(item.result);
    });

    const groupArray = Object.values(groups);
    if (targetDrug) {
        groupArray.sort((a, b) => {
            const pA = (a.d1 === targetDrug) ? a.d2 : a.d1;
            const pB = (b.d1 === targetDrug) ? b.d2 : b.d1;
            return pA.localeCompare(pB);
        });
    } else {
        groupArray.sort((a, b) => a.d1.localeCompare(b.d1) || a.d2.localeCompare(b.d2));
    }

    groupArray.forEach(group => {
        const card = createGroupCard(group, targetDrug);
        container.appendChild(card);
    });
}


// Decompression helper
window.expandNote = async (el, b64) => {
    if (el.dataset.expanded === "true") return;

    try {
        const binStr = atob(b64);
        const len = binStr.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) {
            bytes[i] = binStr.charCodeAt(i);
        }

        const cs = new DecompressionStream('deflate-raw');
        const writer = cs.writable.getWriter();
        writer.write(bytes);
        writer.close();

        const response = new Response(cs.readable);
        const text = await response.text();

        el.querySelector('.note-content').innerHTML = escapeHtml(text);
        el.dataset.expanded = "true";
        el.classList.remove('compressed');
        el.classList.add('expanded');
        
        el.onclick = function(e) {
            e.stopPropagation();
            this.classList.toggle('compressed');
            this.classList.toggle('expanded');
        };
    } catch (e) {
        console.error("Decompression failed", e);
        el.querySelector('.note-content').innerHTML = "<em>[Error decompressing note]</em>";
    }
};

const makeNote = (label, text) => {
    if (!text) return '';
    if (text.startsWith('GZ:')) {
        return `<div class="condition-note compressed" onclick="window.expandNote(this, '${text.substring(3)}')"><strong>${label}:</strong> <span class="note-content" style="color: var(--accent-color);"><em>[Compressed. Click to Read]</em></span></div>`;
    } else {
        return `<div class="condition-note compressed" onclick="this.classList.toggle('compressed'); this.classList.toggle('expanded')"><strong>${label}:</strong> <span class="note-content">${escapeHtml(text)}</span></div>`;
    }
};

function createGroupCard(group, targetDrug) {
    const card = document.createElement('div');
    card.className = 'result-card group-card';

    let overallStatus = '?';
    if (group.statusSet.has('I')) {
        if (group.statusSet.has('C') || group.statusSet.has('U')) overallStatus = 'VI';
        else overallStatus = 'I';
    } else if (group.statusSet.has('U')) {
        overallStatus = 'U';
    } else if (group.statusSet.has('C')) {
        overallStatus = 'C';
    }
    if (group.statusSet.size > 1 && overallStatus !== 'VI' && overallStatus !== 'I') {
        if (group.statusSet.has('C') && group.statusSet.has('U')) overallStatus = 'V';
    }

    const mappedResult = resultMapping[overallStatus] || { text: overallStatus, class: '' };

    let titleHtml = '';
    if (targetDrug) {
        const partner = (group.d1 === targetDrug) ? group.d2 : group.d1;
        titleHtml = `<strong>${escapeHtml(partner)}</strong>`;
    } else {
        titleHtml = `<strong>${escapeHtml(group.d1)}</strong> <span style="margin: 0 0.5rem; color: var(--text-secondary);">+</span> <strong>${escapeHtml(group.d2)}</strong>`;
    }

    const headerHtml = `
        <div class="result-header group-header" onclick="window.toggleGroup(this)">
            <div style="flex:1;">
                <div class="group-title">
                    ${titleHtml}
                </div>
                <div class="type-badge-area">
                    <span class="count-badge">${group.items.length} conditions</span>
                </div>
            </div>
            
            <div style="display:flex; align-items:center; gap: 1rem;">
                <span class="compatibility-badge ${mappedResult.class}">${mappedResult.text}</span>
                 <span class="toggle-icon">▼</span>
            </div>
        </div>
    `;

    let detailsHtml = '<div class="group-details hidden">';
    group.items.forEach((item, index) => {
        const itemStatus = resultMapping[item.result] || { text: item.result, class: '' };
        detailsHtml += `
            <div class="condition-row">
                 <div class="condition-header">
                    <span class="status-dot ${itemStatus.class}" title="${itemStatus.text}">●</span>
                    <span>${index + 1}. <strong>${escapeHtml(item.drug1_conc || 'Unspecified Conc')}</strong> + <strong>${escapeHtml(item.drug2_conc || 'Unspecified Conc')}</strong></span>
                 </div>
                 <div class="condition-meta">
                    ${item.drug1_vehicle ? `<div>Vehicle: ${escapeHtml(item.drug1_vehicle)}</div>` : ''}
                    ${item.container ? `<div>Container: ${escapeHtml(item.container)}</div>` : ''}
                    ${item.storage ? `<div>Storage: ${escapeHtml(item.storage)}</div>` : ''}
                    ${item.study_period ? `<div>Study Period: ${escapeHtml(item.study_period)}</div>` : ''}
                 </div>
                  ${makeNote('Physical', item.compatibility)}
                  ${makeNote('Chemical', item.stability)}
                  ${makeNote('Note', item.notes)}
            </div>
        `;
    });
    detailsHtml += '</div>';

    card.innerHTML = headerHtml + detailsHtml;
    return card;
}

window.toggleGroup = (headerElement) => {
    const details = headerElement.nextElementSibling;
    const icon = headerElement.querySelector('.toggle-icon');

    if (details.classList.contains('hidden')) {
        details.classList.remove('hidden');
        icon.style.transform = 'rotate(180deg)';
    } else {
        details.classList.add('hidden');
        icon.style.transform = 'rotate(0deg)';
    }
};

function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}
